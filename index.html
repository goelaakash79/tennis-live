<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tennis Live</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf9" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0c0a09" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TennisLive" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🎾</span>
          <span class="logo-text">Tennis<strong>Live</strong></span>
        </div>
        <div class="header-actions">
          <button class="icon-btn refresh-btn" id="refresh-btn" aria-label="Refresh scores">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15.5 9A6.5 6.5 0 1 1 12.5 3.2"/>
              <path d="M15.5 2v4H11.5"/>
            </svg>
          </button>
          <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀︎</button>
        </div>
      </div>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="live">
          <span class="tab-dot live-dot"></span>Live
        </button>
        <button class="tab-btn" data-tab="upcoming">Upcoming</button>
        <button class="tab-btn" data-tab="past">Results</button>
      </nav>
      <div class="filter-bar">
        <div class="tour-filter">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="atp">ATP</button>
          <button class="filter-btn" data-filter="wta">WTA</button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="tab-content active" id="tab-live"></div>
      <div class="tab-content" id="tab-upcoming"></div>
      <div class="tab-content" id="tab-past"></div>
    </main>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
