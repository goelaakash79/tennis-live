<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🎾</span>
          <span class="logo-text">Tennis<strong>Live</strong></span>
        </div>
        <div class="header-date" id="header-date"></div>
      </div>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="live">
          <span class="tab-dot live-dot"></span>Live
        </button>
        <button class="tab-btn" data-tab="upcoming">Upcoming</button>
        <button class="tab-btn" data-tab="past">Results</button>
      </nav>
    </header>

    <main class="main">
      <div class="tab-content active" id="tab-live"></div>
      <div class="tab-content" id="tab-upcoming"></div>
      <div class="tab-content" id="tab-past"></div>
    </main>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
